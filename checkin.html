<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Therapy Check-In | Rao Counseling</title>
</head>
<body>
<section style="background-color:#fff;padding:60px 20px;">

  <hr style="width:60px;border:1px solid #d3b8a3;margin:0 auto 25px;">

  <h1 style="color:#2c5e4e;text-align:center;">
    Therapy Check-In
  </h1>

  <p style="max-width:700px;margin:0 auto 40px;text-align:center;font-size:17px;color:#2d4d41;line-height:1.6;">
    Thank you for taking a few minutes to reflect on our work together. Therapy is a collaborative process, and your honest feedback helps me better understand what's been most helpful and where I can better support you.
  </p>
<form action="https://formspree.io/f/myzwepyr" method="POST"
  style="margin:auto;max-width:750px;background-color:#f4f9f6;padding:30px;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05);line-height:1.6;">

  <label>Your name:<br>
    <input type="text" name="name" required style="width:100%;padding:10px;margin:8px 0 20px;border:1px solid #ccc;border-radius:8px;">
  </label>

  <label>Overall, how has therapy felt for you so far?<br>
    <select name="overall_experience" required style="width:100%;padding:10px;margin:8px 0 20px;border:1px solid #ccc;border-radius:8px;">
      <option value="">Select one</option>
      <option>1 - Not helpful</option>
      <option>2</option>
      <option>3</option>
      <option>4</option>
      <option>5 - Very helpful</option>
    </select>
  </label>

  <label>Has the pace of therapy felt right for you?<br>
    <select name="therapy_pace" required style="width:100%;padding:10px;margin:8px 0 20px;border:1px solid #ccc;border-radius:8px;">
      <option value="">Select one</option>
      <option>Too slow</option>
      <option>About right</option>
      <option>Too fast</option>
    </select>
  </label>
<label>What has been the most helpful part of therapy so far?<br>
  <textarea name="most_helpful" rows="4" required style="width:100%;padding:10px;margin:8px 0 20px;border:1px solid #ccc;border-radius:8px;"></textarea>
</label>

<label>Is there anything you would like us to do more of, less of, or differently?<br>
  <textarea name="more_less_different" rows="4" style="width:100%;padding:10px;margin:8px 0 20px;border:1px solid #ccc;border-radius:8px;"></textarea>
</label>

<label>Is there anything you have wanted to bring up but have not felt ready to discuss?<br>
  <textarea name="not_ready_to_discuss" rows="4" style="width:100%;padding:10px;margin:8px 0 20px;border:1px solid #ccc;border-radius:8px;"></textarea>
</label>

<label>Is there anything else you would like me to know before our next session?<br>
  <textarea name="anything_else" rows="4" style="width:100%;padding:10px;margin:8px 0 25px;border:1px solid #ccc;border-radius:8px;"></textarea>
</label>

<button type="submit"
  style="background-color:#2c5e4e;color:white;padding:12px 24px;border:none;border-radius:8px;font-size:16px;">
  Submit Check-In
</button>
</form>
</section>
</body>
</html>
